# --------------------------------------
# Hexo Butterfly Theme Configuration
# https://butterfly.js.org/
# --------------------------------------

# Navigation
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-th
  关于: /about/ || fas fa-user

# Code Blocks
code_blocks:
  theme: darker
  macStyle: true
  height_limit: 500
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social Links
social:
  fab fa-github: https://github.com/AnxForever || Github || '#24292e'

# Images
favicon: /img/favicon.png

avatar:
  img: https://github.com/AnxForever.png
  effect: true

disable_top_img: false

# Default banner - gradient blue
default_top_img: https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Photo/background/landscape.jpg

# Index page banner
index_img: https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Photo/background/landscape.jpg

archive_img: https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Photo/background/landscape.jpg

# Website background
background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Cover/default_bg.png
    - https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Cover/default_bg2.jpg
    - https://cdn.jsdelivr.net/gh/jerryc127/CDN@latest/Cover/default_bg3.jpg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# Post meta
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index page
subtitle:
  enable: true
  effect: true
  typed_option:
    typeSpeed: 80
    backSpeed: 50
  source: false
  sub:
    - "Stay hungry, stay foolish."
    - "代码即诗歌，Bug 即灵感。"

index_layout: 3

index_post_content:
  method: 2
  length: 500

# Post Settings
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/AnxForever
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# Footer
footer:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# Aside / Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: "Stay hungry, stay foolish."
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/AnxForever
  card_announcement:
    enable: true
    content: "欢迎来到 AnxForever 的博客！"
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 2025/01/01

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# Read mode
readmode: true

# Show scroll percent
rightside_scroll_percent: true

# Beautify
beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#49B1F5'

# Font
font:
  global_font_size: 16px
  code_font_size: 14px
  font_family: "'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
  code_font_family: "'JetBrains Mono', 'Fira Code', monospace"

blog_title_font:
  font_link: https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono&display=swap
  font_family: "'Noto Sans SC', sans-serif"

# Rounded corners
rounded_corners_ui: true

# Mask for header/footer images
mask:
  header: true
  footer: true

# Preloader
preloader:
  enable: true
  source: 2
  pace_css_url:

# Page transitions
enter_transitions: true

# Default display mode
display_mode: light

# Theme color
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# Lightbox
lightbox: fancybox

# Lazyload
lazyload:
  enable: true
  native: false
  field: site
  blur: true

# Search
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false

# Share
share:
  use:

# Comments - Utterances
comments:
  use: Utterances
  text: true
  lazyload: true
  count: false

utterances:
  repo: AnxForever/anxforever.github.io
  issue_term: pathname
  light_theme: github-light
  dark_theme: photon-dark

# Word count
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Busuanzi stats
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# PJAX
pjax:
  enable: true
  exclude:

# Snackbar notifications
snackbar:
  enable: true
  position: bottom-left
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant page (prefetch)
instantpage: true

# Open Graph
Open_Graph_meta:
  enable: true

# CSS prefix
css_prefix: true

# Inject Google Fonts
inject:
  head:
    - <link rel="preconnect" href="https://fonts.googleapis.com">
    - <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    - <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  bottom:

# CDN
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
