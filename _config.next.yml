# NexT Theme Configuration
# See: https://theme-next.js.org/docs/getting-started/configuration

# 缓存 + 压缩
cache:
  enable: true
minify: true

# 自定义样式
custom_file_path:
  style: source/_data/styles.styl

# Scheme: Gemini 是最现代化的布局
scheme: Gemini

# Dark Mode
darkmode: true

# 启用 Light/Dark 切换
lightdark:
  enable: true

# 菜单配置
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  about: /about/ || fa fa-user

# 菜单图标显示 + 文章数量角标
menu_settings:
  icons: true
  badges: true

# 侧边栏设置
sidebar:
  position: left
  display: post

# 头像
avatar:
  url: /images/avatar.gif
  rounded: true
  rotated: false

# 社交链接
social:
  GitHub: https://github.com/AnxForever || fab fa-github
  RSS: /atom.xml || fa fa-rss

# 目录
toc:
  enable: true
  number: true
  wrap: true
  expand_all: false
  max_depth: 4

# 字体配置 - Noto Sans
font:
  enable: true
  host: https://fonts.googleapis.com
  global:
    external: true
    family: Noto Sans SC
    size:
  title:
    external: true
    family: Noto Sans SC
    size:
  headings:
    external: true
    family: Noto Sans SC
    size:
  posts:
    external: true
    family: Noto Sans SC
  codes:
    external: true
    family: JetBrains Mono

# 代码块
codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: flat
  fold:
    enable: true
    height: 500
  language: true

# 返回顶部按钮
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# 阅读进度条
reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

# 本地搜索
local_search:
  enable: true
  top_n_per_article: 1
  unescape: false
  preload: false

# 图片懒加载
lazyload: true

# 图片缩放（Medium 风格）
mediumzoom: true

# PJAX 无刷新切换
pjax: true

# 加载进度条
pace:
  enable: true
  color: blue
  theme: minimal

# 文章元信息
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

# 字数统计 + 阅读时间
symbols_count_time:
  separated_meta: true
  item_text_total: true

# 标签图标
tag_icon: true

# RSS 订阅入口
follow_me:
  RSS: /atom.xml || fa fa-rss

# 文章导航
post_navigation: left

# SEO
index_with_subtitle: true
exturl: true
exturl_icon: true

# 不蒜子访客统计
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

# Utterances 评论系统
comments:
  style: tabs
  active: utterances
  lazyload: true

utterances:
  enable: true
  repo: AnxForever/anxforever.github.io
  issue_term: pathname
  theme: preferred-color-scheme

# pangu.js 中英文间自动空格
pangu: true

# 书签（记住阅读位置）
bookmark:
  enable: true
  color: "#222"
  save: auto

# 动画设置
motion:
  enable: true
  async: false
  duration: 200
  transition:
    menu_item: fadeInDown
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeInDown
    coll_header: fadeInLeft
    sidebar: fadeInUp

# 页脚设置
footer:
  since: 2025
  icon:
    name: fa fa-heart
    animated: true
    color: "#ff0000"
  powered: true

# Creative Commons 许可
creative_commons:
  license: by-nc-sa
  size: small
  sidebar: true
  post: true
  language: deed.zh
