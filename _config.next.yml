# NexT Theme Configuration
# See: https://theme-next.js.org/docs/getting-started/configuration

# Scheme: Gemini 是最现代化的布局
scheme: Gemini

# Dark Mode
darkmode: true

# 启用 Light/Dark 切换
lightdark:
  enable: true

# 菜单配置
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  about: /about/ || fa fa-user

# 侧边栏设置
sidebar:
  position: left
  display: post

# 头像
avatar:
  url: /images/avatar.gif
  rounded: true
  rotated: false

# 社交链接
social:
  GitHub: https://github.com/AnxForever || fab fa-github

# 代码块
codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: flat
  fold:
    enable: true
    height: 500
  language: true

# 返回顶部按钮
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# 阅读进度条
reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

# 本地搜索
local_search:
  enable: true
  top_n_per_article: 1
  unescape: false
  preload: false

# 图片懒加载
lazyload: true

# 图片缩放（Medium 风格）
mediumzoom: true

# PJAX 无刷新切换
pjax: true

# 加载进度条
pace:
  enable: true
  color: blue
  theme: minimal

# 不蒜子访客统计
busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

# pangu.js 中英文间自动空格
pangu: true

# 书签（记住阅读位置）
bookmark:
  enable: true
  color: "#222"
  save: auto

# 页脚设置
footer:
  since: 2025
  icon:
    name: fa fa-heart
    animated: true
    color: "#ff0000"
  powered: true
